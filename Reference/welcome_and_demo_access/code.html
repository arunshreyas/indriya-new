<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Welcome to Indriya</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["'Playfair Display'", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<!-- Main Container (iOS Safe Area Simulation) -->
<div class="relative flex h-screen w-full flex-col justify-between bg-background-light dark:bg-background-dark overflow-hidden px-6 pt-12 pb-8">
<!-- Top Section: Logo -->
<div class="flex flex-col items-center mt-12">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-primary to-blue-400 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
<div class="relative bg-background-dark border border-slate-800 p-4 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        self_improvement
                    </span>
</div>
</div>
<div class="mt-6 text-center">
<h1 class="font-serif text-4xl tracking-tight text-white mb-3">Welcome to Indriya</h1>
<p class="text-slate-400 text-base max-w-[280px] mx-auto leading-relaxed font-light">
                    A private early-access experience for discipline and self-mastery.
                </p>
</div>
</div>
<!-- Middle Section: Visual Accent -->
<div class="flex-grow flex items-center justify-center py-8">
<div class="w-full max-w-sm aspect-square relative opacity-20">
<div class="absolute inset-0 bg-gradient-to-b from-primary/40 to-transparent rounded-full blur-3xl"></div>
<div class="w-full h-full border-[0.5px] border-slate-700/50 rounded-full flex items-center justify-center">
<div class="w-3/4 h-3/4 border-[0.5px] border-slate-700/50 rounded-full flex items-center justify-center">
<div class="w-1/2 h-1/2 border-[0.5px] border-slate-700/50 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Section: Auth Buttons & Footer -->
<div class="w-full max-w-[480px] mx-auto space-y-4">
<button class="flex w-full items-center justify-center gap-3 rounded-xl h-[56px] bg-slate-100 dark:bg-white text-slate-900 text-base font-semibold transition-all active:scale-[0.98]">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
<button class="flex w-full items-center justify-center gap-3 rounded-xl h-[56px] border border-slate-700 bg-transparent text-white text-base font-semibold transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-slate-300" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                    mail
                </span>
<span>Continue with Email</span>
</button>
<div class="pt-6 pb-2 text-center">
<p class="text-[11px] uppercase tracking-widest text-slate-500 font-medium">
                    No ads • Minimal data • Demo access
                </p>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</div>
</div>
<!-- Background Decorative Element (Subtle Gradient) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[40%] bg-blue-900/10 rounded-full blur-[120px]"></div>
</div>
</body></html>
