<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Indriya - Begin with Intention</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c32f",
                        "background-light": "#f8f8f5",
                        "background-dark": "#121212", // Deeper charcoal for better immersion
                        "neutral-dark": "#231e10",
                        "saffron-muted": "#685a31",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>body {
    font-family: "Inter", sans-serif
    }
.radio-custom:checked + .card-content {
    border-color: #f4c32f;
    background-color: rgba(244, 195, 47, 0.05)
    }
.radio-custom:checked + .card-content .radio-indicator {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDGovIMfMOrGCvwCGJKnBuC3f__yVUwyPCIkx1RgNEfd-TnRG6jovmo2jP8SfDyBD5wK8M909onRxfXcFt5jRt_-3_hZjHTN4MfGAGWqbmxJtR-jbRbetTXPfxfCar-PZOkpYrltDxXDjB84WFK1xtsvaqW3rHpMVg3BhYdlDh4xWjm3QIliAdl13DM7ngoUkXlizjJOj13rmVFdwU4944Xp0NoYuR9eoF8-84lv5GvuzAJ_5C64Fxwr6zsGG9Cb5CA4ZMVhuwSBQc);
    border-color: #f4c32f
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white antialiased font-display">
<!-- Mobile Container (iOS Form Factor Simulation) -->
<div class="relative mx-auto flex h-full min-h-screen max-w-[430px] flex-col bg-background-light dark:bg-background-dark overflow-x-hidden border-x border-white/5">
<!-- Status Bar Space (iOS) -->
<div class="h-12 w-full flex items-center justify-between px-8 pt-4">
<span class="text-xs font-semibold">9:41</span>
<div class="flex gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Header Section -->
<header class="flex flex-col px-6 pt-12 pb-8">
<h1 class="text-white tracking-tight text-[36px] font-bold leading-tight pb-3">
                Begin with <br/>intention.
            </h1>
<p class="text-primary/70 text-[17px] font-normal leading-relaxed">
                Indriya is a daily discipline practice rooted in Sanatana Dharma.
            </p>
</header>
<!-- Selection Group -->
<main class="flex flex-col flex-grow px-6 gap-4">
<!-- Option: Discipline -->
<label class="relative cursor-pointer group">
<input checked="" class="radio-custom hidden" name="intention" type="radio"/>
<div class="card-content flex items-center justify-between rounded-xl border border-saffron-muted/40 bg-neutral-dark/40 p-5 transition-all duration-200">
<div class="flex flex-col gap-1">
<p class="text-white text-lg font-semibold leading-tight">Discipline</p>
<p class="text-white/50 text-sm font-normal">Consistency and rigor</p>
</div>
<div class="radio-indicator h-6 w-6 rounded-full border-2 border-saffron-muted bg-transparent"></div>
</div>
</label>
<!-- Option: Calm -->
<label class="relative cursor-pointer group">
<input class="radio-custom hidden" name="intention" type="radio"/>
<div class="card-content flex items-center justify-between rounded-xl border border-saffron-muted/40 bg-neutral-dark/40 p-5 transition-all duration-200">
<div class="flex flex-col gap-1">
<p class="text-white text-lg font-semibold leading-tight">Calm</p>
<p class="text-white/50 text-sm font-normal">Stillness and sensory withdrawal</p>
</div>
<div class="radio-indicator h-6 w-6 rounded-full border-2 border-saffron-muted bg-transparent"></div>
</div>
</label>
<!-- Option: Self-control -->
<label class="relative cursor-pointer group">
<input class="radio-custom hidden" name="intention" type="radio"/>
<div class="card-content flex items-center justify-between rounded-xl border border-saffron-muted/40 bg-neutral-dark/40 p-5 transition-all duration-200">
<div class="flex flex-col gap-1">
<p class="text-white text-lg font-semibold leading-tight">Self-control</p>
<p class="text-white/50 text-sm font-normal">Mastery over impulses</p>
</div>
<div class="radio-indicator h-6 w-6 rounded-full border-2 border-saffron-muted bg-transparent"></div>
</div>
</label>
</main>
<!-- Fixed Footer CTA -->
<footer class="mt-auto px-6 pt-6 pb-12">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-[58px] px-5 bg-primary text-background-dark text-[17px] font-bold leading-normal tracking-wide active:scale-[0.98] transition-transform">
<span>Begin Practice</span>
</button>
<!-- iOS Home Indicator -->
<div class="mx-auto mt-8 h-1 w-32 rounded-full bg-white/20"></div>
</footer>
<!-- Decorative Background Pattern (Subtle) -->
<div class="absolute inset-0 -z-10 opacity-10 pointer-events-none">
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/20 blur-[120px]"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-primary/10 blur-[120px]"></div>
</div>
</div>
</body></html>
