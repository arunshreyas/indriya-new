<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Evening Reflection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#cfb017",
                        "background-light": "#f8f8f6",
                        "background-dark": "#0a0a08", // Darker for evening reflection
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glow-effect {
            background: radial-gradient(circle at center, rgba(207, 176, 23, 0.08) 0%, rgba(10, 10, 8, 0) 70%);
        }
        .ios-blur {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 antialiased selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[430px] mx-auto border-x border-primary/5 shadow-2xl">
<!-- Soft Background Lighting -->
<div class="absolute inset-0 glow-effect pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Top App Bar -->
<header class="relative z-10 flex items-center justify-between px-4 pt-12 pb-4">
<button class="flex items-center justify-center size-10 rounded-full text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-sm font-medium tracking-[0.2em] uppercase text-primary/80">Evening Reflection</h1>
<div class="size-10"></div> <!-- Placeholder for symmetry -->
</header>
<!-- Main Content Area -->
<main class="relative z-10 flex-1 overflow-y-auto px-6 pb-10 space-y-8">
<!-- Hero Prompt -->
<section class="text-center pt-4 pb-2">
<h2 class="text-2xl font-light tracking-tight text-slate-100 mb-2">Quiet your mind and look inward.</h2>
<div class="w-12 h-0.5 bg-primary/30 mx-auto rounded-full"></div>
</section>
<!-- Input Group 1 -->
<section class="space-y-3">
<label class="block">
<span class="text-xs font-medium uppercase tracking-widest text-primary/60 ml-1">Discipline</span>
<p class="text-slate-400 text-sm mt-1 mb-3">Where did you act with sensory mastery today?</p>
<textarea class="w-full min-h-[140px] bg-primary/5 border border-primary/10 rounded-xl p-4 text-slate-200 placeholder:text-slate-600 focus:border-primary/40 focus:ring-1 focus:ring-primary/40 transition-all resize-none font-light leading-relaxed" placeholder="Recall moments of focus..."></textarea>
</label>
</section>
<!-- Input Group 2 -->
<section class="space-y-3">
<label class="block">
<span class="text-xs font-medium uppercase tracking-widest text-primary/60 ml-1">Growth</span>
<p class="text-slate-400 text-sm mt-1 mb-3">Where can you improve tomorrow?</p>
<textarea class="w-full min-h-[140px] bg-primary/5 border border-primary/10 rounded-xl p-4 text-slate-200 placeholder:text-slate-600 focus:border-primary/40 focus:ring-1 focus:ring-primary/40 transition-all resize-none font-light leading-relaxed" placeholder="Areas for refinement..."></textarea>
</label>
</section>
<!-- Optional Section -->
<section class="pt-2">
<div class="flex items-center gap-3 mb-3">
<span class="material-symbols-outlined text-primary/40 text-xl">loyalty</span>
<span class="text-xs font-medium uppercase tracking-widest text-primary/60">Gratitude Note</span>
<span class="text-[10px] text-slate-600 ml-auto italic">Optional</span>
</div>
<input class="w-full bg-primary/5 border-b border-primary/10 border-x-0 border-t-0 p-3 text-slate-200 placeholder:text-slate-700 focus:border-primary/60 focus:ring-0 transition-all font-light" placeholder="One thing you are thankful for..." type="text"/>
</section>
</main>
<!-- Bottom Action -->
<footer class="relative z-10 p-6 pb-12 bg-gradient-to-t from-background-dark via-background-dark to-transparent">
<button class="group relative w-full h-16 bg-primary overflow-hidden rounded-xl active:scale-[0.98] transition-all flex items-center justify-center">
<!-- Inner glow effect for button -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center gap-3 text-background-dark font-semibold tracking-wide">
<span>Close the Day</span>
<span class="material-symbols-outlined text-xl">nights_stay</span>
</div>
</button>
<p class="text-center text-[10px] text-slate-600 mt-4 tracking-tighter uppercase">May your rest be intentional</p>
</footer>
<!-- Bottom Safe Area Indicator (iOS style) -->
<div class="h-1.5 w-32 bg-slate-800 mx-auto rounded-full mb-2 shrink-0 opacity-40"></div>
</div>
</body></html>
