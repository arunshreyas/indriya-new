<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Morning Ritual Practice</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;family=Noto+Serif+Devanagari:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c32f",
                        "background-light": "#f8f8f5",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "devanagari": ["Noto Serif Devanagari", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .mantra-gradient {
            background: linear-gradient(180deg, #f4c32f 0%, #d4a017 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-[430px] mx-auto border-x border-primary/10">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-6 pt-12">
<button class="text-white/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</button>
<h2 class="text-white/60 text-sm font-semibold uppercase tracking-[0.2em] pr-6">Morning Ritual</h2>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content (Meditation Space) -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center gap-12">
<!-- Sacred Text Section -->
<div class="space-y-6">
<h1 class="font-devanagari text-5xl md:text-6xl font-bold mantra-gradient leading-relaxed">
                    ॐ पूर्णमदः पूर्णमिदं
                </h1>
<p class="text-white/80 text-lg font-light leading-relaxed italic max-w-xs mx-auto">
                    "That is whole; this is whole. From wholeness, wholeness comes."
                </p>
</div>
<!-- Audio Control -->
<div class="py-4">
<button class="group relative flex items-center justify-center size-24 rounded-full border border-primary/30 bg-primary/5 hover:bg-primary/10 transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-5xl group-hover:scale-110 transition-transform">
                        play_arrow
                    </span>
</button>
<p class="mt-4 text-xs text-primary/60 font-medium tracking-widest uppercase">Begin Audio Guide</p>
</div>
<!-- Intention Card -->
<div class="w-full max-w-sm">
<div class="relative group">
<div class="absolute -inset-0.5 bg-primary/20 rounded-xl blur opacity-30 group-hover:opacity-50 transition duration-1000"></div>
<div class="relative flex flex-col items-center gap-3 rounded-xl border border-primary/20 bg-background-dark/50 p-6 backdrop-blur-sm">
<span class="text-primary/70 text-xs font-bold uppercase tracking-widest">Intention</span>
<p class="text-white text-base font-normal leading-normal">
                            Today, act with restraint and clarity.
                        </p>
</div>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="p-8 pb-12">
<button class="w-full h-14 bg-primary text-background-dark font-bold text-lg rounded-xl flex items-center justify-center gap-2 shadow-[0_10px_30px_-10px_rgba(244,195,47,0.4)] active:scale-[0.98] transition-all">
                Complete Ritual
                <span class="material-symbols-outlined font-bold">check_circle</span>
</button>
<!-- Progress Indicator Dots -->
<div class="flex justify-center gap-2 mt-8">
<div class="size-1.5 rounded-full bg-primary"></div>
<div class="size-1.5 rounded-full bg-primary/20"></div>
<div class="size-1.5 rounded-full bg-primary/20"></div>
</div>
</footer>
<!-- Subtle Atmospheric Decoration -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[40%] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-10%] w-[60%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
</div>
</body></html>
