<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Indriya - Home Daily Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E2943B", // Muted saffron
                        "background-dark": "#121212",
                        "charcoal": "#1A1A1A",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #121212;
        }
        .bg-noise {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuC-XasIsW1fUTYbnyM8NSTMRX0h-StFF9OYx5Beq2TuD2RoCNuzm-kMWsKhPjCqf45Rh9GiWKA6OblzMAsRm-gSt2NRkIVn8A8Y2ssuq3O5wY3dr0BRuo8IrqOKkdr164BR0l_f4NTNQeWNLxqVrO2DEem_jfEPebImhfL10kSETKdjooociEgewjwJvtDE9PqQFqLXAMzSXZ6mTqQPSBFlxBHZn3LY5g3aIIIjbHBv1GyAnoDBjfJBKsbkfUwCYn_FntvIRpBMFos);
            opacity: 0.02;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-fill {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-slate-200 antialiased font-sans">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-white/5 bg-background-dark">
<div class="fixed inset-0 bg-noise pointer-events-none"></div>
<header class="relative z-10 flex items-center justify-between px-6 pt-8 pb-4">
<div class="flex flex-col">
<span class="text-[10px] font-semibold tracking-[0.2em] uppercase text-primary opacity-80">Daily Loop</span>
<h1 class="text-2xl font-serif italic text-white">Namaste</h1>
</div>
<button class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-xl">notifications</span>
</button>
</header>
<main class="relative z-10 flex-1 px-6 py-6 space-y-4">
<div class="relative overflow-hidden rounded-2xl bg-charcoal border border-white/5 p-6 shadow-xl">
<div class="flex justify-between items-start mb-4">
<span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Today's Wisdom</span>
<span class="material-symbols-outlined text-primary/60">menu_book</span>
</div>
<h2 class="text-xl font-serif text-white mb-2 leading-snug">Perform your duty without attachment to the results.</h2>
<p class="text-sm text-slate-400 font-light mb-6">Bhagavad Gita 2.47</p>
<button class="inline-flex items-center justify-center px-6 py-2 rounded-full border border-primary/30 text-primary text-xs font-medium tracking-wide active:bg-primary/5 transition-colors">
                    Read
                </button>
</div>
<div class="relative overflow-hidden rounded-2xl bg-charcoal border border-white/5 p-6 shadow-xl">
<div class="flex justify-between items-start mb-4">
<span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Today's Practice</span>
<span class="material-symbols-outlined text-primary/60">filter_vintage</span>
</div>
<div class="flex items-center gap-4 mb-6">
<div class="w-12 h-12 rounded-full border border-primary/20 flex items-center justify-center bg-primary/5">
<span class="material-symbols-outlined text-primary">psychology</span>
</div>
<div>
<h3 class="text-white text-base font-medium">Sensory Mastery</h3>
<p class="text-xs text-slate-500">Focus on the breath during transitions</p>
</div>
</div>
<button class="w-full flex items-center justify-center h-12 rounded-xl bg-primary text-background-dark text-sm font-semibold tracking-wide active:scale-[0.98] transition-transform">
                    Practice Now
                </button>
</div>
<div class="relative overflow-hidden rounded-2xl bg-charcoal border border-white/5 p-6 shadow-xl">
<div class="flex justify-between items-start mb-4">
<span class="text-[10px] font-bold tracking-widest uppercase text-slate-500">Reflection</span>
<span class="material-symbols-outlined text-slate-600">edit_note</span>
</div>
<div class="group flex items-center justify-between py-2 cursor-pointer">
<span class="text-slate-400 text-sm italic font-light">Add a note...</span>
<span class="material-symbols-outlined text-slate-600 text-sm">add_circle</span>
</div>
<div class="mt-4 pt-4 border-t border-white/5 flex items-center gap-2">
<div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-primary/20 w-1/3"></div>
</div>
<span class="text-[8px] uppercase tracking-tighter text-slate-600">1/3 Done</span>
</div>
</div>
</main>
<footer class="relative z-20 flex h-20 items-center justify-around px-6 border-t border-white/5 bg-charcoal/90 backdrop-blur-xl">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined material-symbols-fill text-2xl">
                    radio_button_checked
                </span>
<span class="text-[10px] font-medium tracking-wide">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined text-2xl">
                    filter_vintage
                </span>
<span class="text-[10px] font-medium tracking-wide">Practice</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined text-2xl">
                    auto_stories
                </span>
<span class="text-[10px] font-medium tracking-wide">Wisdom</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-symbols-outlined text-2xl">
                    person
                </span>
<span class="text-[10px] font-medium tracking-wide">Profile</span>
</button>
</footer>
</div>

</body></html>
